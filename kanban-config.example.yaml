# yaml-language-server: $schema=./schema/kanban-config.schema.json
#
# Copy to: .hermes/kanban-overrides/kanban-config.yaml
# Or generate automatically: hermes kanban-advanced init
#                             (also available via Hermes dashboard → Kanban-Advanced tab)
# Validate: python hermes-kanban-advanced-workflow/scripts/validate_config.py .hermes/kanban-overrides/kanban-config.yaml
# Provision: bash hermes-kanban-advanced-workflow/scripts/provision.sh

schema_version: "1.0.0"

# ---------------------------------------------------------------------------
# Branch model
# ---------------------------------------------------------------------------
working_branch: main
# trigger_branch: production  # optional — protected deploy branch agents must not push to
feature_branch_prefix: "kanban/"

# ---------------------------------------------------------------------------
# Agent profiles
# Names must match dispatch profiles created by: hermes kanban-advanced init
# (uses hermes profile create <name> --no-skills — not --clone)
# orchestrator_profile → ${orchestrator_profile} in skill files
# worker_profile       → ${worker_profile} in skill files
# ---------------------------------------------------------------------------
orchestrator_profile: kanban-advanced-orchestrator
worker_profile: kanban-advanced-worker
preflight_profiles: "kanban-advanced-worker,kanban-advanced-orchestrator"

# ---------------------------------------------------------------------------
# Coding agent
# The headless CLI command the worker dispatches for code changes.
# Set during init from commands currently on PATH (step 1c) or dashboard Save.
# Prefer unambiguous names: cursor-agent (Cursor), grok (Grok) — not shared
# "agent" unless you accept the symlink conflict notice (see coding-agents.md).
# Supported: cursor-agent, agent, claude, codex, grok, aider, gemini, hermes, or custom.
# Substituted as ${coding_agent_binary} in skill files.
# ---------------------------------------------------------------------------
coding_agent_binary: hermes
# Model ID for the coding CLI. Use "auto" for CLI default.
# Cursor: cursor-agent --list-models or agent --list-models
coding_agent_model: "auto"

# ---------------------------------------------------------------------------
# Paths (set automatically by init — override only if your layout differs)
# ---------------------------------------------------------------------------
bundle_path: "hermes-kanban-advanced-workflow"
skills_output_path: ".hermes/skills/kanban-advanced"
plan_memory_path: ".hermes/kanban/memory"

# Optional extra directories to search for plan markdown drafts (resolver also
# searches built-in agent tool dirs). Init always writes canonical SSOT first:
plan_search_dirs:
  - .hermes/kanban/plans
#  - custom/plans

# ---------------------------------------------------------------------------
# UI stack (optional — framework-neutral presentation acceptance)
# See plugin/data/references/frontend-neutrality.md
# ---------------------------------------------------------------------------
# ui_stack:
#   framework: react-next
#   page_glob: "frontend/app/**/page.tsx"
#   motion:
#     reduced_query: "prefers-reduced-motion: reduce"
#     entry_transition_pattern: "animate-in fade-in|transition-opacity"
#   test_command: "cd frontend && npm test --"

# ---------------------------------------------------------------------------
# Environment / secrets  (optional)
# ---------------------------------------------------------------------------
# required_secrets: "MONGODB_URI,SECRET_KEY"
# allowed_environments: "local,dev,production"

# ---------------------------------------------------------------------------
# API health check  (optional)
# ---------------------------------------------------------------------------
# preflight_api_url: "http://127.0.0.1:8000/healthz"

# ---------------------------------------------------------------------------
# Gateway timeout
# ---------------------------------------------------------------------------
gateway_timeout_seconds: 1800

# Stale dispatch timeout — set at bootstrap (Hermes config.yaml, not overlay):
#   kanban.dispatch_stale_timeout_seconds = 14400  (via hermes config set at init)
# Rationale: plugin/data/references/dispatch-stale-timeout.md

# Notifications — per-card lifecycle cron; optional full walk-away (post-exec + completion notify)
notify_lifecycle: true
# Optional override for lifecycle/completion cron deliver (platform slug, all, or local for CI).
# When omitted, scripts/lib/resolve_notify_deliver.sh picks home channel automatically.
# notify_deliver: discord
walk_away_mode: false

# ---------------------------------------------------------------------------
# Final audit (Tier 1/2 sanity + post-flight remediation)
# ---------------------------------------------------------------------------
# final_audit_max_remediation_rounds: 2
# final_audit_overrides:
#   - signal: doc_coverage_gap
#     path: scripts/lib/some_internal.py
#     rationale: "Internal helper — no scripts.md entry required"

# ---------------------------------------------------------------------------
# Escalation thresholds (cron / board_keeper escalation chain)
# ---------------------------------------------------------------------------
escalation_max_attempts:
  coding_agent: 3
  worker: 3
  orchestrator: 3

# ---------------------------------------------------------------------------
# Parallel subagent gate (default on — Hermes delegate_task; serial fallback)
# Set enabled: false to force pre_dispatch_gate.sh only. See parallel-subagent-gate.md
# ---------------------------------------------------------------------------
subagent_gate:
  enabled: true
  timeouts:
    plan_gate: 30
    env_gate: 120
    infra_gate: 15
    plan_parse: 60
    cron_setup: 30
