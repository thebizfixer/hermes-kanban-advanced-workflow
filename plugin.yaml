name: kanban-advanced
version: 1.0.0
description: Multi-agent kanban workflow for Hermes Agent — decompose plans, dispatch workers, govern execution
author: thebizfixer
requires_env: []
provides_tools:
  - kanban_create
  - kanban_list
  - kanban_show
  - kanban_complete
  - kanban_block
  - kanban_unblock
  - kanban_link
provides_hooks:
  - on_session_start
  - post_tool_call
